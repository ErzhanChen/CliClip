<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景：圆角矩形，采用深色终端风格 -->
  <rect width="512" height="512" rx="110" fill="#1E1E1E"/>
  
  <!-- 装饰性渐变背景 -->
  <rect x="40" y="40" width="432" height="432" rx="80" fill="url(#paint0_linear)" fill-opacity="0.05"/>

  <!-- 剪贴板/提示符 核心图形 -->
  <g filter="url(#dropShadow)">
    <!-- 模拟提示符 '>' 的回形针形态 -->
    <path d="M160 140L340 256L160 372" stroke="#00ADFF" stroke-width="45" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- 闪烁的光标 '_' -->
    <path d="M300 380H380" stroke="#FFFFFF" stroke-width="45" stroke-linecap="round"/>
  </g>

  <!-- 底部装饰线，象征路径转换 -->
  <path d="M100 440H412" stroke="#FFFFFF" stroke-width="8" stroke-dasharray="20 20" stroke-opacity="0.3"/>

  <defs>
    <linearGradient id="paint0_linear" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="white"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <filter id="dropShadow" x="120" y="120" width="300" height="300" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <darken />
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>
</svg>
